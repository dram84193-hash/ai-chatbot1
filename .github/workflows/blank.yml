<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        pre { background: #1f2937; padding: 1rem; border-radius: 0.5rem; margin: 0.5rem 0; position: relative; }
        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; }
        .copy-btn { position: absolute; right: 0.5rem; top: 0.5rem; font-size: 0.75rem; background: #374151; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#171717] flex flex-col border-r border-gray-800">
        <div class="p-4 font-bold text-xl border-b border-gray-800 flex items-center gap-2">
            <i data-lucide="bot"></i> Anuj's AI
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar" id="chat-history">
            </div>
        <button onclick="toggleSettings()" class="p-4 hover:bg-gray-800 flex items-center gap-3 transition">
            <i data-lucide="settings"></i> Settings
        </button>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div id="settings-modal" class="hidden absolute inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
            <div class="bg-[#1f2937] p-6 rounded-xl w-full max-w-md border border-gray-700">
                <h2 class="text-xl font-bold mb-4">API Configuration</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1">Base URL</label>
                        <input id="api-url" type="text" placeholder="https://api.openai.com/v1" class="w-full bg-[#0b0e14] border border-gray-600 p-2 rounded">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">API Key</label>
                        <input id="api-key" type="password" placeholder="sk-..." class="w-full bg-[#0b0e14] border border-gray-600 p-2 rounded">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Model Name</label>
                        <input id="model-name" type="text" placeholder="gpt-4" class="w-full bg-[#0b0e14] border border-gray-600 p-2 rounded">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">System Prompt (Tone Setting)</label>
                        <textarea id="system-prompt" rows="3" class="w-full bg-[#0b0e14] border border-gray-600 p-2 rounded text-sm">You are a helpful assistant. Respond in Hinglish when asked.</textarea>
                    </div>
                </div>
                <div class="mt-6 flex gap-2">
                    <button onclick="saveSettings()" class="flex-1 bg-blue-600 hover:bg-blue-700 p-2 rounded font-medium">Save Settings</button>
                    <button onclick="toggleSettings()" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded">Close</button>
                </div>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar">
            <div class="max-w-3xl mx-auto text-center mt-20 opacity-50">
                <i data-lucide="sparkles" class="mx-auto mb-4 w-12 h-12"></i>
                <p>Configure your API settings to start chatting.</p>
            </div>
        </div>

        <div class="p-4 border-t border-gray-800">
            <div class="max-w-3xl mx-auto relative">
                <textarea id="user-input" rows="1" placeholder="Ask anything..." 
                    class="w-full bg-[#1f2937] border border-gray-700 rounded-xl p-4 pr-12 focus:outline-none focus:border-blue-500 resize-none overflow-hidden"></textarea>
                <button id="send-btn" onclick="handleSend()" class="absolute right-3 bottom-3 p-2 bg-blue-600 rounded-lg hover:bg-blue-500 transition disabled:opacity-50">
                    <i data-lucide="send-horizontal"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let chatMessages = [];
        
        // Load Settings on Start
        window.onload = () => {
            lucide.createIcons();
            document.getElementById('api-url').value = localStorage.getItem('api_url') || '';
            document.getElementById('api-key').value = localStorage.getItem('api_key') || '';
            document.getElementById('model-name').value = localStorage.getItem('model_name') || '';
            document.getElementById('system-prompt').value = localStorage.getItem('system_prompt') || 'You are a helpful assistant.';
        };

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            localStorage.setItem('api_url', document.getElementById('api-url').value);
            localStorage.setItem('api_key', document.getElementById('api-key').value);
            localStorage.setItem('model_name', document.getElementById('model-name').value);
            localStorage.setItem('system_prompt', document.getElementById('system-prompt').value);
            toggleSettings();
            alert('Settings Saved Locally!');
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const query = input.value.trim();
            
            if (!query) return;

            // UI Update
            addMessage('user', query);
            input.value = '';
            btn.disabled = true;

            const thinkingId = addMessage('assistant', '<div class="flex items-center gap-2">Thinking <span class="animate-pulse">...</span></div>', true);

            try {
                const response = await fetch(`${localStorage.getItem('api_url')}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('api_key')}`
                    },
                    body: JSON.stringify({
                        model: localStorage.getItem('model_name'),
                        messages: [
                            { role: "system", content: localStorage.getItem('system_prompt') },
                            ...chatMessages.map(m => ({ role: m.role, content: m.content })),
                            { role: "user", content: query }
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                updateAssistantMessage(thinkingId, aiResponse);
                chatMessages.push({ role: 'user', content: query });
                chatMessages.push({ role: 'assistant', content: aiResponse });
                
            } catch (error) {
                updateAssistantMessage(thinkingId, "Error: Check your API settings or URL. " + error.message);
            } finally {
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        function addMessage(role, text, isThinking = false) {
            const window = document.getElementById('chat-window');
            const id = Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            msgDiv.innerHTML = `
                <div class="max-w-[85%] p-4 rounded-2xl ${role === 'user' ? 'bg-blue-700' : 'bg-[#1f2937] border border-gray-700'}" id="msg-${id}">
                    <p class="text-xs opacity-50 mb-1 uppercase">${role}</p>
                    <div class="prose prose-invert max-w-none">${isThinking ? text : marked.parse(text)}</div>
                </div>
            `;
            
            window.appendChild(msgDiv);
            window.scrollTo({ top: window.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateAssistantMessage(id, text) {
            const el = document.querySelector(`#msg-${id} .prose`);
            el.innerHTML = marked.parse(text);
            
            // Add Copy Buttons to Code Blocks
            el.querySelectorAll('pre').forEach(block => {
                const btn = document.createElement('button');
                btn.innerText = 'Copy';
                btn.className = 'copy-btn';
                btn.onclick = () => {
                    navigator.clipboard.writeText(block.innerText.replace('Copy', ''));
                    btn.innerText = 'Copied!';
                    setTimeout(() => btn.innerText = 'Copy', 2000);
                };
                block.appendChild(btn);
            });
        }
    </script>
</body>
</html>
